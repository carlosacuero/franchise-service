services:
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: .
    ports:
      - "8081:8081"
    environment:
      MONGODB_URI: mongodb://mongo:27017/franquicias_db
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data: {}
