spring.application.name=franquicias-management-api
server.port=${PORT:8081}

spring.mongodb.uri=${MONGODB_URI:mongodb+srv://Mongoadmin:Soporte12345@serverdbfranquicias.global.mongocluster.cosmos.azure.com/franquicias_db?tls=true&authMechanism=SCRAM-SHA-256&retrywrites=false&maxIdleTimeMS=120000}
spring.mongodb.database=${MONGODB_DATABASE:franquicias_db}

spring.jackson.serialization.indent_output=true

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.com.practice.franquicias_management_api=INFO
logging.level.org.springframework.web.reactive=WARN
logging.level.org.mongodb.driver=WARN
